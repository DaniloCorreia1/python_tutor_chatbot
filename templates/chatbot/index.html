<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PyTutor — Assistente Python com IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #13161f;
      --surface2: #1a1e2a;
      --border: #252a38;
      --accent: #4ade80;
      --accent2: #22d3ee;
      --accent3: #a78bfa;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --human-bg: #1e2535;
      --ai-bg: #131a14;
      --error: #f87171;
      --font-mono: 'JetBrains Mono', monospace;
      --font-display: 'Syne', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .logo-text span { color: var(--accent); }

    .logo-badge {
      font-size: 10px;
      font-family: var(--font-mono);
      background: rgba(74,222,128,0.1);
      color: var(--accent);
      border: 1px solid rgba(74,222,128,0.3);
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 1px;
    }

    .header-right { display: flex; align-items: center; gap: 12px; }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s;
    }
    #status-dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
    #status-dot.offline { background: var(--error); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    #status-text { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }

    .btn-clear {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-family: var(--font-mono);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-clear:hover { border-color: var(--error); color: var(--error); }

    /* ── LAYOUT PRINCIPAL ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 260px;
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .sidebar-title {
      padding: 16px;
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    .suggestion-btn {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      padding: 14px 16px;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font-display);
      line-height: 1.4;
      transition: background 0.15s;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .suggestion-btn:hover { background: var(--surface2); }
    .suggestion-btn .sug-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .suggestion-btn .sug-text { color: var(--text-muted); font-size: 12px; display: block; margin-top: 2px; }

    /* ── ÁREA DO CHAT ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── WELCOME ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      text-align: center;
      padding: 40px;
      animation: fadeIn 0.5s ease;
    }

    .welcome-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, rgba(74,222,128,0.15), rgba(34,211,238,0.15));
      border: 1px solid rgba(74,222,128,0.3);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }

    .welcome h2 { font-size: 28px; font-weight: 800; }
    .welcome h2 em { font-style: normal; color: var(--accent); }
    .welcome p { color: var(--text-muted); font-size: 15px; max-width: 400px; line-height: 1.6; }

    /* ── MENSAGENS ── */
    .message {
      display: flex;
      gap: 14px;
      animation: slideIn 0.3s ease;
      max-width: 900px;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .message.human { flex-direction: row-reverse; align-self: flex-end; }
    .message.ai { align-self: flex-start; width: 100%; }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message.human .avatar { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
    .message.ai .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }

    .bubble {
      padding: 14px 18px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.7;
    }

    .message.human .bubble {
      background: var(--human-bg);
      border: 1px solid #2a3148;
      border-top-right-radius: 4px;
      max-width: 480px;
    }

    .message.ai .bubble {
      background: var(--ai-bg);
      border: 1px solid rgba(74,222,128,0.15);
      border-top-left-radius: 4px;
      flex: 1;
    }

    /* Markdown dentro das respostas da IA */
    .bubble h1, .bubble h2, .bubble h3 {
      font-family: var(--font-display);
      margin: 16px 0 8px;
      color: var(--accent2);
    }
    .bubble h1 { font-size: 18px; }
    .bubble h2 { font-size: 16px; }
    .bubble h3 { font-size: 14px; color: var(--accent); }

    .bubble p { margin: 8px 0; }
    .bubble ul, .bubble ol { margin: 8px 0; padding-left: 24px; }
    .bubble li { margin: 4px 0; }
    .bubble strong { color: var(--accent2); }
    .bubble em { color: var(--accent3); }

    .bubble code:not(pre code) {
      font-family: var(--font-mono);
      background: rgba(74,222,128,0.1);
      color: var(--accent);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }

    .bubble pre {
      margin: 12px 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .bubble pre code {
      font-family: var(--font-mono) !important;
      font-size: 13px !important;
    }

    /* ── DIGITANDO ── */
    .typing-indicator {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      animation: fadeIn 0.3s ease;
    }

    .typing-bubble {
      background: var(--ai-bg);
      border: 1px solid rgba(74,222,128,0.15);
      border-radius: 14px;
      border-top-left-radius: 4px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .typing-text {
      font-size: 13px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    .dots { display: flex; gap: 4px; }
    .dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── INPUT AREA ── */
    .input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      transition: border-color 0.2s;
    }
    .input-wrapper:focus-within { border-color: rgba(74,222,128,0.4); }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      font-family: var(--font-display);
      resize: none;
      max-height: 120px;
      line-height: 1.6;
    }
    #input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), #22c55e);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    #send-btn:hover { transform: scale(1.05); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .input-hint {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      margin-top: 8px;
      padding: 0 4px;
    }

    .input-hint kbd {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
    }

    /* ── RESPONSIVO ── */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      header { padding: 12px 16px; }
      #messages { padding: 16px; }
      .input-area { padding: 12px 16px 16px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">🐍</div>
    <div>
      <div class="logo-text">Py<span>Tutor</span></div>
    </div>
    <div class="logo-badge">GPT-4o-mini + LangChain</div>
  </div>
  <div class="header-right">
    <div id="status-dot"></div>
    <span id="status-text">verificando...</span>
    <button class="btn-clear" id="btn-clear">🗑 Limpar</button>
  </div>
</header>

<!-- LAYOUT PRINCIPAL -->
<div class="main">

  <!-- SIDEBAR COM SUGESTÕES -->
  <aside class="sidebar">
    <div class="sidebar-title">💡 Sugestões</div>

    <button class="suggestion-btn" onclick="usarSugestao(this)">
      <span class="sug-icon">📋</span>
      <div>
        <div>Como criar uma lista em Python?</div>
        <span class="sug-text">Estruturas de dados básicas</span>
      </div>
    </button>

    <button class="suggestion-btn" onclick="usarSugestao(this)">
      <span class="sug-icon">🔄</span>
      <div>
        <div>Qual a diferença entre list e tuple?</div>
        <span class="sug-text">Tipos imutáveis vs mutáveis</span>
      </div>
    </button>

    <button class="suggestion-btn" onclick="usarSugestao(this)">
      <span class="sug-icon">⚡</span>
      <div>
        <div>Como usar list comprehension?</div>
        <span class="sug-text">Sintaxe pythônica</span>
      </div>
    </button>

    <button class="suggestion-btn" onclick="usarSugestao(this)">
      <span class="sug-icon">🎯</span>
      <div>
        <div>O que são decorators em Python?</div>
        <span class="sug-text">Programação avançada</span>
      </div>
    </button>

    <button class="suggestion-btn" onclick="usarSugestao(this)">
      <span class="sug-icon">🔌</span>
      <div>
        <div>Como fazer requisições HTTP com requests?</div>
        <span class="sug-text">Biblioteca requests</span>
      </div>
    </button>

    <button class="suggestion-btn" onclick="usarSugestao(this)">
      <span class="sug-icon">🧪</span>
      <div>
        <div>Como escrever testes unitários com pytest?</div>
        <span class="sug-text">Boas práticas de testes</span>
      </div>
    </button>

    <button class="suggestion-btn" onclick="usarSugestao(this)">
      <span class="sug-icon">🗄️</span>
      <div>
        <div>Como usar dicionários em Python?</div>
        <span class="sug-text">Estrutura chave-valor</span>
      </div>
    </button>

    <button class="suggestion-btn" onclick="usarSugestao(this)">
      <span class="sug-icon">🧩</span>
      <div>
        <div>O que é programação orientada a objetos?</div>
        <span class="sug-text">Classes e objetos</span>
      </div>
    </button>
  </aside>

  <!-- ÁREA DO CHAT -->
  <div class="chat-area">
    <div id="messages">
      <!-- Tela de boas-vindas (some quando a primeira mensagem é enviada) -->
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🐍</div>
        <h2>Olá! Sou o <em>PyTutor</em></h2>
        <p>Seu assistente especialista em Python com IA. Faça qualquer pergunta sobre Python e receba explicações detalhadas com exemplos de código.</p>
      </div>
    </div>

    <!-- INPUT -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="input"
          rows="1"
          placeholder="Pergunte algo sobre Python... ex: Como criar uma função?"
        ></textarea>
        <button id="send-btn" onclick="enviar()">▶</button>
      </div>
      <div class="input-hint">
        Pressione <kbd>Enter</kbd> para enviar · <kbd>Shift+Enter</kbd> para nova linha
      </div>
    </div>
  </div>

</div>

<script>
  // ============================================================
  // ESTADO DA APLICAÇÃO
  // ============================================================
  let sessionId = localStorage.getItem('pytutor_session') || null;
  let enviando = false;

  // ============================================================
  // CONFIGURAÇÃO DO MARKED (renderizador de Markdown)
  // ============================================================
  marked.setOptions({
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      return hljs.highlightAuto(code).value;
    },
    breaks: true,
    gfm: true,
  });

  // ============================================================
  // VERIFICAR STATUS DA API
  // ============================================================
  async function verificarStatus() {
    try {
      const res = await fetch('/api/status/');
      const data = await res.json();
      const dot = document.getElementById('status-dot');
      const txt = document.getElementById('status-text');

      if (data.api_key_configurada) {
        dot.className = 'online';
        txt.textContent = `${data.modelo} · online`;
      } else {
        dot.className = 'offline';
        txt.textContent = 'API key não configurada';
      }
    } catch {
      document.getElementById('status-dot').className = 'offline';
      document.getElementById('status-text').textContent = 'servidor offline';
    }
  }

  // ============================================================
  // CARREGAR HISTÓRICO (ao reabrir)
  // ============================================================
  async function carregarHistorico() {
    if (!sessionId) return;
    try {
      const res = await fetch(`/api/historico/${sessionId}/`);
      if (!res.ok) { sessionId = null; localStorage.removeItem('pytutor_session'); return; }
      const data = await res.json();
      if (data.mensagens && data.mensagens.length > 0) {
        esconderBemVindo();
        data.mensagens.forEach(msg => {
          adicionarMensagem(msg.tipo === 'humano' ? 'human' : 'ai', msg.conteudo, false);
        });
        rolarParaBaixo();
      }
    } catch {}
  }

  // ============================================================
  // ENVIAR MENSAGEM
  // ============================================================
  async function enviar() {
    const input = document.getElementById('input');
    const pergunta = input.value.trim();
    if (!pergunta || enviando) return;

    enviando = true;
    document.getElementById('send-btn').disabled = true;
    input.value = '';
    input.style.height = 'auto';

    esconderBemVindo();
    adicionarMensagem('human', pergunta);
    const indicador = mostrarDigitando();
    rolarParaBaixo();

    try {
      const res = await fetch('/api/chat/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, pergunta }),
      });

      const data = await res.json();
      indicador.remove();

      if (data.session_id) {
        sessionId = data.session_id;
        localStorage.setItem('pytutor_session', sessionId);
      }

      if (data.sucesso) {
        adicionarMensagem('ai', data.resposta);
      } else {
        adicionarErro(data.erro || 'Erro desconhecido.');
      }

    } catch (err) {
      indicador.remove();
      adicionarErro('Não foi possível conectar ao servidor.');
    }

    enviando = false;
    document.getElementById('send-btn').disabled = false;
    rolarParaBaixo();
    input.focus();
  }

  // ============================================================
  // FUNÇÕES DE UI
  // ============================================================
  function esconderBemVindo() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
  }

  function adicionarMensagem(tipo, conteudo, animar = true) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${tipo}`;
    if (!animar) div.style.animation = 'none';

    const avatar = tipo === 'human' ? '👤' : '🐍';
    const conteudoHtml = tipo === 'ai' ? marked.parse(conteudo) : escapeHtml(conteudo);

    div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="bubble">${conteudoHtml}</div>
    `;

    container.appendChild(div);

    // Aplica highlight.js nos blocos de código gerados pelo marked
    div.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
  }

  function adicionarErro(msg) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.style.cssText = `
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: #f87171;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-family: var(--font-mono);
      animation: fadeIn 0.3s ease;
    `;
    div.textContent = '⚠ ' + msg;
    container.appendChild(div);
  }

  function mostrarDigitando() {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'typing-indicator';
    div.innerHTML = `
      <div class="avatar" style="background: linear-gradient(135deg, var(--accent), var(--accent2));">🐍</div>
      <div class="typing-bubble">
        <span class="typing-text">PyTutor está pensando</span>
        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    `;
    container.appendChild(div);
    return div;
  }

  function rolarParaBaixo() {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function usarSugestao(btn) {
    const texto = btn.querySelector('div > div:first-child').textContent;
    document.getElementById('input').value = texto;
    document.getElementById('input').focus();
  }

  // ============================================================
  // LIMPAR CONVERSA
  // ============================================================
  document.getElementById('btn-clear').onclick = async () => {
    if (!sessionId) return;
    if (!confirm('Limpar o histórico da conversa?')) return;
    try {
      await fetch(`/api/historico/${sessionId}/limpar/`, { method: 'DELETE' });
    } catch {}
    sessionId = null;
    localStorage.removeItem('pytutor_session');
    document.getElementById('messages').innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🐍</div>
        <h2>Olá! Sou o <em>PyTutor</em></h2>
        <p>Conversa reiniciada. Faça sua primeira pergunta!</p>
      </div>
    `;
  };

  // ============================================================
  // TEXTAREA AUTO-RESIZE + ATALHO ENTER
  // ============================================================
  const input = document.getElementById('input');

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      enviar();
    }
  });

  // ============================================================
  // INICIALIZAÇÃO
  // ============================================================
  verificarStatus();
